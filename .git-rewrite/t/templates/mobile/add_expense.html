{% extends "mobile/base.html" %}
{% block title %}Add Expense | {{ tenant.name }}{% endblock %}

{% block extra_head %}
<style>
    .form-group { margin-bottom: 0.8rem; }
    .form-group label { font-weight: 600; font-size: 0.85rem; color: var(--text-secondary); display: block; margin-bottom: 0.2rem; }
    .form-group input, .form-group select, .form-group textarea {
        width: 100%;
        padding: 0.5rem 0.7rem;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface);
        color: var(--text);
        transition: 0.2s;
        font-size: 0.9rem;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(230,126,34,0.1);
    }
    .form-group textarea { resize: vertical; min-height: 60px; }
    .form-check { display: flex; align-items: center; gap: 0.4rem; }
    .form-check input { width: auto; }
</style>
{% endblock %}

{% block body %}
<h5 class="fw-bold mb-3">Add New Expense / Loan</h5>
<form method="post">
    {% csrf_token %}
    <div class="form-group">
        <label>Title *</label>
        <input type="text" name="title" required placeholder="e.g., Medicine, Grocery, Loan to Ali">
    </div>
    <div class="form-group">
        <label>Amount (₹) *</label>
        <input type="number" name="amount" step="0.01" required placeholder="0.00">
    </div>
    <div class="form-group">
        <label>Category</label>
        <select name="category">
            <option value="general">General</option>
            <option value="medicine">Medicine</option>
            <option value="food">Food</option>
            <option value="utility">Utility</option>
            <option value="given_loan">Given Loan (Udhaar)</option>
            <option value="taken_loan">Taken Loan</option>
            <option value="other">Other</option>
        </select>
    </div>
    <div class="form-group">
        <label>Person Name (for loans)</label>
        <input type="text" name="person_name" placeholder="Name of person">
    </div>
    <div class="form-group">
        <label>Phone</label>
        <input type="text" name="phone" placeholder="Contact number">
    </div>
    <div class="form-group">
        <label>Address</label>
        <textarea name="address" placeholder="Address (optional)"></textarea>
    </div>
    <div class="form-group">
        <label>Reason / Purpose</label>
        <input type="text" name="reason" placeholder="Why this transaction?">
    </div>
    <div class="form-group">
        <label>Additional Notes</label>
        <textarea name="notes" placeholder="Any extra details"></textarea>
    </div>
    <div class="form-group">
        <label>Due Date</label>
        <input type="date" name="due_date">
    </div>
    <div class="form-group form-check">
        <input type="checkbox" name="is_credit" id="is_credit">
        <label for="is_credit">Money given to someone (receivable)</label>
    </div>
    <button type="submit" class="btn btn-primary-custom w-100">Save Expense</button>
</form>
{% endblock %}
