{% extends "desktop/base.html" %}
{% block title %}Add Expense | {{ tenant.name }}{% endblock %}

{% block content %}
<h2>Add New Expense / Loan</h2>
<form method="post" class="row g-3">
    {% csrf_token %}
    <div class="col-md-6">
        <label class="form-label">Title *</label>
        <input type="text" name="title" class="form-control" required placeholder="e.g., Medicine, Grocery, Loan to Ali">
    </div>
    <div class="col-md-6">
        <label class="form-label">Amount (₹) *</label>
        <input type="number" name="amount" step="0.01" class="form-control" required placeholder="0.00">
    </div>
    <div class="col-md-6">
        <label class="form-label">Category</label>
        <select name="category" class="form-select">
            <option value="general">General</option>
            <option value="medicine">Medicine</option>
            <option value="food">Food</option>
            <option value="utility">Utility</option>
            <option value="given_loan">Given Loan (Udhaar)</option>
            <option value="taken_loan">Taken Loan</option>
            <option value="other">Other</option>
        </select>
    </div>
    <div class="col-md-6">
        <label class="form-label">Person Name</label>
        <input type="text" name="person_name" class="form-control" placeholder="Name of person">
    </div>
    <div class="col-md-6">
        <label class="form-label">Phone</label>
        <input type="text" name="phone" class="form-control" placeholder="Contact number">
    </div>
    <div class="col-md-6">
        <label class="form-label">Due Date</label>
        <input type="date" name="due_date" class="form-control">
    </div>
    <div class="col-12">
        <label class="form-label">Address</label>
        <textarea name="address" class="form-control" rows="2" placeholder="Address (optional)"></textarea>
    </div>
    <div class="col-md-6">
        <label class="form-label">Reason / Purpose</label>
        <input type="text" name="reason" class="form-control" placeholder="Why this transaction?">
    </div>
    <div class="col-md-6">
        <label class="form-label">Additional Notes</label>
        <textarea name="notes" class="form-control" rows="2" placeholder="Any extra details"></textarea>
    </div>
    <div class="col-12 form-check">
        <input type="checkbox" name="is_credit" id="is_credit" class="form-check-input">
        <label for="is_credit" class="form-check-label">Money given to someone (receivable)</label>
    </div>
    <div class="col-12">
        <button type="submit" class="btn btn-primary">Save Expense</button>
    </div>
</form>
{% endblock %}
