{% extends "desktop/base.html" %}
{% block title %}Create Regular Customer | {{ tenant.name }}{% endblock %}

{% block extra_head %}
<style>
  /* ===== Premium Create Customer Styles ===== */
  .page-header {
    margin-bottom: 2rem;
    padding: 0.5rem 0;
  }
  .page-header h2 {
    font-size: 2rem;
    font-weight: 700;
    color: var(--text);
    margin: 0 0 0.2rem;
    letter-spacing: -0.02em;
  }
  .page-header h2 i {
    color: var(--accent);
    margin-right: 0.4rem;
  }
  .page-header p {
    color: var(--muted);
    font-size: 1rem;
    margin: 0;
  }

  .form-card {
    background: var(--surface);
    border-radius: 24px;
    border: 1px solid var(--border);
    box-shadow: 0 8px 32px rgba(0,0,0,0.04);
    padding: 2rem 2rem 1.8rem;
    transition: box-shadow 0.3s ease, transform 0.2s ease;
  }
  .form-card:hover {
    box-shadow: 0 12px 48px rgba(0,0,0,0.06);
    transform: translateY(-2px);
  }

  .form-section-title {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin: 0 0 1.2rem;
    padding-bottom: 0.4rem;
    border-bottom: 2px solid var(--border);
  }
  .form-section-title i {
    margin-right: 0.5rem;
    color: var(--accent);
  }

  .form-group {
    margin-bottom: 1.2rem;
  }
  .form-group label {
    font-weight: 600;
    font-size: 0.85rem;
    color: var(--text-secondary);
    display: block;
    margin-bottom: 0.3rem;
  }
  .form-group label .required {
    color: #dc3545;
    margin-left: 0.2rem;
  }
  .form-group .input-wrap {
    position: relative;
  }
  .form-group .input-wrap i {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 1rem;
    z-index: 2;
    transition: color 0.2s;
  }
  .form-group .input-wrap textarea + i {
    top: 18px;
    transform: none;
  }
  .form-group .input-wrap input,
  .form-group .input-wrap textarea {
    width: 100%;
    padding: 0.7rem 0.9rem 0.7rem 2.8rem;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    background: var(--bg);
    color: var(--text);
    font-size: 0.95rem;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    outline: none;
  }
  .form-group .input-wrap input:focus,
  .form-group .input-wrap textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(26,42,58,0.08);
    background: var(--surface);
  }
  .form-group .input-wrap input:focus + i,
  .form-group .input-wrap textarea:focus + i {
    color: var(--accent);
  }
  .form-group .input-wrap input::placeholder,
  .form-group .input-wrap textarea::placeholder {
    color: var(--muted);
    font-weight: 400;
  }
  .form-group .input-wrap textarea {
    padding-left: 2.8rem;
    min-height: 80px;
    resize: vertical;
  }

  /* Form Actions */
  .form-actions {
    display: flex;
    gap: 1rem;
    margin-top: 2rem;
    padding-top: 1.2rem;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .btn-save {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 40px;
    padding: 0.7rem 2.5rem;
    font-weight: 700;
    font-size: 1rem;
    transition: all 0.25s;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(26,42,58,0.15);
  }
  .btn-save:hover {
    background: var(--accent-hover);
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(26,42,58,0.2);
  }
  .btn-save:active {
    transform: scale(0.96);
  }
  .btn-save i {
    font-size: 1.1rem;
  }
  .btn-cancel {
    background: var(--surface-alt);
    color: var(--text-secondary);
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 0.7rem 2rem;
    font-weight: 600;
    font-size: 1rem;
    transition: all 0.25s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
  }
  .btn-cancel:hover {
    background: var(--border);
    color: var(--text);
    transform: translateY(-2px);
  }

  /* Responsive */
  @media (max-width: 768px) {
    .form-card { padding: 1.5rem; }
    .form-group .input-wrap input,
    .form-group .input-wrap textarea {
      padding-left: 2.4rem;
      font-size: 0.9rem;
    }
    .page-header h2 { font-size: 1.6rem; }
    .form-actions { flex-direction: column; }
    .btn-save, .btn-cancel { width: 100%; justify-content: center; }
  }
  @media (max-width: 576px) {
    .form-card { padding: 1rem; border-radius: 16px; }
    .form-group .input-wrap input,
    .form-group .input-wrap textarea {
      padding: 0.6rem 0.7rem 0.6rem 2.2rem;
      font-size: 0.85rem;
    }
  }
</style>
{% endblock %}

{% block content %}

<!-- ====== PAGE HEADER ====== -->
<div class="page-header">
  <h2><i class="fas fa-user-plus"></i> Create Regular Customer</h2>
  <p>Add a new customer to your regular list</p>
</div>

<!-- ====== FORM CARD ====== -->
<div class="form-card">
  <form method="post" class="row g-3">
    {% csrf_token %}

    <div class="col-12">
      <div class="form-section-title"><i class="fas fa-id-card"></i> Customer Details</div>
    </div>

    <div class="col-md-6">
      <div class="form-group">
        <label>Full Name <span class="required">*</span></label>
        <div class="input-wrap">
          <i class="fas fa-user"></i>
          <input type="text" name="name" required placeholder="e.g., Muhammad Ali">
        </div>
      </div>
    </div>

    <div class="col-md-6">
      <div class="form-group">
        <label>Phone Number <span class="required">*</span></label>
        <div class="input-wrap">
          <i class="fas fa-phone"></i>
          <input type="text" name="phone" required placeholder="e.g., 03XX-XXXXXXX">
        </div>
      </div>
    </div>

    <div class="col-12">
      <div class="form-group">
        <label>Address</label>
        <div class="input-wrap">
          <i class="fas fa-map-marker-alt" style="top:18px; transform:none;"></i>
          <textarea name="address" rows="2" placeholder="Complete address (optional)"></textarea>
        </div>
      </div>
    </div>

    <!-- ====== ACTIONS ====== -->
    <div class="col-12">
      <div class="form-actions">
        <button type="submit" class="btn-save">
          <i class="fas fa-save"></i> Create Customer
        </button>
        <a href="/portal/{{ tenant.schema_name }}/customers/?tab=regular" class="btn-cancel">
          <i class="fas fa-times"></i> Cancel
        </a>
      </div>
    </div>

  </form>
</div>

{% endblock %}
