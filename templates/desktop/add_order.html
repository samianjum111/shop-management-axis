
{% extends "desktop/base.html" %}
{% block content %}
<h2>Add Order</h2>
<form method="post">
    {% csrf_token %}
    <div class="mb-2"><label>Customer</label><select name="customer" class="form-control">
        <option value="new">New Customer</option>
        {% for c in customers %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}
    </select></div>
    <div class="mb-2"><label>New Name</label><input name="name" class="form-control" placeholder="If new"></div>
    <div class="mb-2"><label>Phone</label><input name="phone" class="form-control"></div>
    <div class="mb-2"><label>Address</label><input name="address" class="form-control"></div>
    <div class="mb-2"><label>KG</label><input name="total_kg" class="form-control" type="number" step="0.1"></div>
    <div class="mb-2"><input type="checkbox" name="cleaning"> Cleaning Done</div>
    <div class="mb-2"><label>Ready in</label>
        <input type="number" name="time_value" class="form-control" placeholder="e.g. 2">
        <select name="time_type" class="form-control"><option value="minutes">Minutes</option><option value="hours">Hours</option><option value="days">Days</option></select>
    </div>
    <button class="btn btn-primary">Create Order</button>
</form>
{% endblock %}
