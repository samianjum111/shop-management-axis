<!DOCTYPE html>
<html><head><title>Login</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<style>body{background:#f8f9fa;} .login-box{margin-top:100px;}</style>
</head>
<body>
<div class="container">
<div class="row justify-content-center">
<div class="col-md-4 login-box">
    <h4 class="text-center">{{ tenant.name }}</h4>
    <p class="text-center text-muted">Portal Login</p>
    {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
    <form method="post">
        {% csrf_token %}
        <input name="username" class="form-control mb-2" placeholder="Username">
        <input name="password" type="password" class="form-control mb-2" placeholder="Password">
        <button class="btn btn-primary w-100">Login</button>
    </form>
</div>
</div>
</div>
</body></html>
