<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | {{ tenant.name }}</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts for premium typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 40%, #24243e 100%);
            background-size: 400% 400%;
            animation: gradientShift 20s ease infinite;
            padding: 20px;
            margin: 0;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .login-card {
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-radius: 36px;
            padding: 44px 36px 36px;
            box-shadow:
                0 30px 60px -20px rgba(0,0,0,0.6),
                inset 0 1px 0 rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.07);
            transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.3s ease;
        }
        .login-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 40px 80px -20px rgba(0,0,0,0.7);
        }

        .login-header {
            text-align: center;
            margin-bottom: 34px;
        }
        .login-header .brand-icon {
            font-size: 3.2rem;
            color: #f59e0b;
            background: rgba(245, 158, 11, 0.12);
            width: 80px;
            height: 80px;
            line-height: 80px;
            border-radius: 50%;
            margin: 0 auto 12px;
            display: inline-block;
            text-align: center;
            box-shadow: 0 8px 24px rgba(245, 158, 11, 0.15);
            transition: transform 0.3s ease;
        }
        .login-card:hover .brand-icon {
            transform: scale(1.04);
        }
        .login-header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }
        .login-header p {
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.02em;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 14px;
            padding: 12px 16px;
            color: #fca5a5;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            backdrop-filter: blur(4px);
        }
        .error-message i {
            font-size: 1.1rem;
            color: #f87171;
        }

        .form-group {
            margin-bottom: 22px;
        }
        .form-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 6px;
        }
        .form-group .input-wrapper {
            position: relative;
        }
        .form-group .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.25);
            font-size: 1rem;
            transition: color 0.2s ease;
        }
        .form-group .input-wrapper input:focus + i,
        .form-group .input-wrapper input:focus ~ i {
            color: #f59e0b;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px 14px 46px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            background: rgba(255,255,255,0.04);
            color: #ffffff;
            font-size: 1rem;
            font-weight: 400;
            outline: none;
            transition: all 0.25s ease;
        }
        .form-group input::placeholder {
            color: rgba(255,255,255,0.2);
            font-weight: 300;
        }
        .form-group input:focus {
            border-color: #f59e0b;
            background: rgba(255,255,255,0.06);
            box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.12);
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #fff;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: 0.02em;
            box-shadow: 0 8px 24px -4px rgba(245, 158, 11, 0.25);
        }
        .btn-login:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 32px -6px rgba(245, 158, 11, 0.4);
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
        }
        .btn-login:active {
            transform: scale(0.97);
        }

        .login-footer {
            text-align: center;
            margin-top: 28px;
            color: rgba(255,255,255,0.2);
            font-size: 0.7rem;
            letter-spacing: 0.04em;
        }
        .login-footer a {
            color: rgba(255,255,255,0.35);
            text-decoration: none;
            transition: color 0.2s;
            font-weight: 500;
        }
        .login-footer a:hover {
            color: #f59e0b;
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 32px 20px 28px;
                border-radius: 28px;
            }
            .login-header h1 {
                font-size: 1.6rem;
            }
            .login-header .brand-icon {
                width: 64px;
                height: 64px;
                line-height: 64px;
                font-size: 2.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <div class="brand-icon"><i class="fas fa-wheat-awn"></i></div>
            <h1>{{ tenant.name }}</h1>
            <p>Flour Mill Management</p>
        </div>

        {% if error %}
        <div class="error-message">
            <i class="fas fa-exclamation-circle"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" name="username" placeholder="Enter your username" autofocus required>
                </div>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
            </div>
            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>

        <div class="login-footer">
            &copy; 2026 {{ tenant.name }} &middot; Powered by <a href="#">Axis System</a>
        </div>
    </div>
</body>
</html>
