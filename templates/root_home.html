<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f5f5f5; }
        .container { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; max-width: 500px; }
        h1 { color: #333; }
        p { color: #666; line-height: 1.6; }
        .portal-link { background: #007bff; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; display: inline-block; margin-top: 10px; }
        .portal-link:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Shop Management System</h1>
        <p>Please enter your portal URL to access your dashboard.</p>
        <p><strong>Example:</strong> http://149.56.80.98/portal/&lt;your-tenant-id&gt;/</p>
        <p style="margin-top: 20px; font-size: 14px; color: #aaa;">If you are a tenant owner, use your custom portal link.</p>
    </div>
</body>
</html>
